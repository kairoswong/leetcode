<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Solutions Explorer</title>
<link rel="icon" href="../assets/leetcode.ico">
<script src="scripts/solutions-data.js"></script>
<style>
  /* ===== Self-hosted fonts ===== */
  @font-face {
    font-family: 'Instrument Sans';
    src: url('fonts/InstrumentSans.woff2') format('woff2');
    font-weight: 400 700;
    font-display: swap;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('fonts/JetBrainsMono.woff2') format('woff2');
    font-weight: 400 600;
    font-display: swap;
  }
  /* =====================================================
     Design System — LeetCode Explorer
     Palette: Dark surface (#0A0B0E), warm accent (cyan #00D4AA),
     Typography: Instrument Sans (UI) + JetBrains Mono (code)
     Spacing: 8px grid
     ===================================================== */

  :root {
    /* Surface */
    --surface-0: #0A0B0E;
    --surface-1: #121318;
    --surface-2: #1A1B22;
    --surface-3: #24262E;
    --surface-hover: #2C2E38;

    /* Text */
    --text-primary: #EAEBED;
    --text-secondary: #9B9DA6;
    --text-tertiary: #6B6D78;

    /* Accent */
    --accent: #00D4AA;
    --accent-dim: #00A888;
    --accent-glow: rgba(0, 212, 170, 0.15);

    /* Status */
    --green: #22C55E;
    --green-bg: rgba(34, 197, 94, 0.1);
    --yellow: #EAB308;
    --yellow-bg: rgba(234, 179, 8, 0.1);
    --red: #EF4444;
    --red-bg: rgba(239, 68, 68, 0.1);
    --amber: #F59E0B1a;
    --amber-bg: rgba(245, 158, 11, 0.1);

    /* Misc */
    --border: #2C2E38;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --font-ui: 'Instrument Sans', system-ui, sans-serif;
    --font-code: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-ui);
    background: var(--surface-0);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* =====================================================
     Layout
     ===================================================== */
  .app-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* =====================================================
     Header
     ===================================================== */
  .header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-title h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-title .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    border: 1px solid var(--border);
  }

  .header-stats {
    display: flex;
    gap: 24px;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .stat-item .stat-value {
    font-weight: 600;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .stat-dot.easy { background: var(--green); }
  .stat-dot.medium { background: var(--yellow); }
  .stat-dot.hard { background: var(--red); }

  /* =====================================================
     Search & Filter Bar
     ===================================================== */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 0;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .search-box input::placeholder {
    color: var(--text-tertiary);
  }

  .search-box .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    font-size: 14px;
    pointer-events: none;
  }

  .filter-buttons {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface-2);
    color: var(--text-secondary);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--surface-0);
  }

  .filter-btn.active.easy { background: var(--green); border-color: var(--green); }
  .filter-btn.active.medium { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .filter-btn.active.hard { background: var(--red); border-color: var(--red); }

  .sort-select {
    padding: 8px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-secondary);
    font-family: var(--font-ui);
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  .sort-select:focus {
    border-color: var(--accent);
  }

  /* =====================================================
     Solution Grid
     ===================================================== */
  .solution-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding-bottom: 64px;
  }

  .solution-card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .solution-card:hover {
    border-color: var(--accent-dim);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .solution-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--surface-3);
    transition: background 0.2s;
  }

  .solution-card:hover::before {
    background: var(--accent);
  }

  .solution-card.incomplete::before {
    background: var(--amber);
  }

  .solution-card.incomplete:hover::before {
    background: var(--amber);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .card-id {
    font-family: var(--font-code);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
    white-space: nowrap;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .card-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .badge.easy {
    background: var(--green-bg);
    color: var(--green);
  }

  .badge.medium {
    background: var(--yellow-bg);
    color: var(--yellow);
  }

  .badge.hard {
    background: var(--red-bg);
    color: var(--red);
  }

  .badge.incomplete {
    background: var(--amber-bg);
    color: var(--amber);
    border: 1px solid rgba(245, 158, 11, 0.3);
  }

  .card-meta {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .card-meta .complexity {
    font-family: var(--font-code);
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-clamp: 2;
    overflow: hidden;
  }

  /* =====================================================
     Status indicator
     ===================================================== */
  .status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
  }

  .status-indicator .check {
    color: var(--green);
  }

  .status-indicator .clock {
    color: var(--amber);
  }

  /* =====================================================
     Empty state
     ===================================================== */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--text-tertiary);
    grid-column: 1 / -1;
  }

  .empty-state .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state h3 {
    font-size: 18px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  /* =====================================================
     Footer / last updated
     ===================================================== */
  .footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
    font-size: 13px;
    color: var(--text-tertiary);
  }

  /* =====================================================
     Responsive
     ===================================================== */
  @media (max-width: 768px) {
    .header { padding: 32px 0 24px; }
    .header-title h1 { font-size: 22px; }
    .header-stats { gap: 16px; }
    .solution-grid {
      grid-template-columns: 1fr;
    }
    .filter-bar {
      flex-direction: column;
      align-items: stretch;
    }
    .filter-buttons {
      flex-wrap: wrap;
    }
  }

  @media (max-width: 480px) {
    .header-top { flex-direction: column; align-items: flex-start; }
    .app-container { padding: 0 16px; }
  }

  /* =====================================================
     Animations
     ===================================================== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .solution-card {
    animation: fadeInUp 0.3s ease both;
  }

  .solution-card:nth-child(1) { animation-delay: 0.02s; }
  .solution-card:nth-child(2) { animation-delay: 0.04s; }
  .solution-card:nth-child(3) { animation-delay: 0.06s; }
  .solution-card:nth-child(4) { animation-delay: 0.08s; }
  .solution-card:nth-child(5) { animation-delay: 0.10s; }
  .solution-card:nth-child(6) { animation-delay: 0.12s; }
  .solution-card:nth-child(7) { animation-delay: 0.14s; }
  .solution-card:nth-child(8) { animation-delay: 0.16s; }
  .solution-card:nth-child(9) { animation-delay: 0.18s; }
  .solution-card:nth-child(10) { animation-delay: 0.20s; }
  .solution-card:nth-child(11) { animation-delay: 0.22s; }
  .solution-card:nth-child(12) { animation-delay: 0.24s; }
  .solution-card:nth-child(13) { animation-delay: 0.26s; }
  .solution-card:nth-child(14) { animation-delay: 0.28s; }
  .solution-card:nth-child(15) { animation-delay: 0.30s; }
  .solution-card:nth-child(n+16) { animation-delay: 0.32s; }
</style>
</head>
<body>

<div class="app-container" id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="header-title">
        <div class="logo-icon">⌘</div>
        <div>
          <h1>LeetCode Explorer</h1>
          <p style="font-size:14px;color:var(--text-tertiary);margin-top:2px;">
            Solutions · Algorithms · Visualizations
          </p>
        </div>
      </div>
      <div class="header-stats" id="stats">
        <div class="stat-item">
          Total <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-dot easy"></span>
          Easy <span class="stat-value" id="stat-easy">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-dot medium"></span>
          Medium <span class="stat-value" id="stat-medium">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-dot hard"></span>
          Hard <span class="stat-value" id="stat-hard">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search by ID, title, or keyword…" autocomplete="off">
    </div>
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn easy" data-filter="easy">Easy</button>
      <button class="filter-btn medium" data-filter="medium">Medium</button>
      <button class="filter-btn hard" data-filter="hard">Hard</button>
      <button class="filter-btn" data-filter="incomplete">In Progress</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="id-asc">ID ↑</option>
      <option value="id-desc">ID ↓</option>
      <option value="title-asc">Title A–Z</option>
      <option value="title-desc">Title Z–A</option>
    </select>
  </div>

  <!-- Solution Grid -->
  <div class="solution-grid" id="solutionGrid"></div>

</div>

<script>
// =====================================================
// Data: Loaded from data/solutions-data.js
// To regenerate after adding new solutions:
//     python scripts/generate-index.py
// =====================================================

let SOLUTIONS = [];

// Load solutions data
function loadSolutions() {
  if (typeof SOLUTIONS_DATA !== 'undefined') {
    SOLUTIONS = SOLUTIONS_DATA;
    init();
  } else {
    console.error('SOLUTIONS_DATA not found. Run: python scripts/generate-index.py');
    document.getElementById('solutionGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>Failed to load solutions</h3>
        <p>Make sure <code>data/solutions-data.js</code> exists.<br>
           Run <code>python scripts/generate-index.py</code> to generate it.</p>
      </div>`;
  }
}

// =====================================================
// Helpers
// =====================================================

function difficultyValue(d) {
  return d === 'easy' ? 1 : d === 'medium' ? 2 : 3;
}

function statusIcon(s) {
  return s === 'solved'
    ? '<span class="check">✔</span> Solved'
    : '<span class="clock">⏳</span> In Progress';
}

// =====================================================
// Render
// =====================================================

function renderCards(list) {
  const grid = document.getElementById('solutionGrid');

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No matches found</h3>
        <p>Try adjusting your search or filter.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(s => `
    <div class="solution-card${s.status === 'incomplete' ? ' incomplete' : ''}"
         data-id="${s.id}"
         onclick="openSolution(${s.id})">
      <div class="card-header">
        <div>
          <div class="card-id">#${String(s.id).padStart(3, '0')}</div>
          <div class="card-title">${s.title}</div>
        </div>
        <div class="card-badges">
          <span class="badge ${s.difficulty}">${s.difficulty}</span>
          ${s.status === 'incomplete' ? '<span class="badge incomplete">WIP</span>' : ''}
        </div>
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-meta">
        ${s.status === 'solved'
          ? `<span class="complexity">⌛ ${s.complexity.time} &nbsp;·&nbsp; 📦 ${s.complexity.space}</span>`
          : ''}
        <span class="status-indicator">${statusIcon(s.status)}</span>
      </div>
    </div>
  `).join('');
}

// =====================================================
// Stats
// =====================================================

function updateStats(list) {
  const total = list.length;
  const easy = list.filter(s => s.difficulty === 'easy').length;
  const medium = list.filter(s => s.difficulty === 'medium').length;
  const hard = list.filter(s => s.difficulty === 'hard').length       ;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-easy').textContent = easy;
  document.getElementById('stat-medium').textContent = medium;
  document.getElementById('stat-hard').textContent = hard;
}

// =====================================================
// Filtering & Sorting
// =====================================================

let currentFilter = 'all';
let currentSort = 'id-asc';
let currentSearch = '';

function getFilteredAndSorted() {
  let list = [...SOLUTIONS];

  // Filter
  if (currentFilter !== 'all') {
    if (currentFilter === 'incomplete') {
      list = list.filter(s => s.status === 'incomplete');
    } else {
      list = list.filter(s => s.difficulty === currentFilter && s.status === 'solved');
    }
  }

  // Search
  if (currentSearch.trim()) {
    const q = currentSearch.toLowerCase();
    list = list.filter(s =>
      s.title.toLowerCase().includes(q) ||
      String(s.id).includes(q) ||
      s.tags.some(t => t.includes(q)) ||
      s.difficulty.includes(q)
    );
  }

  // Sort
  const [field, dir] = currentSort.split('-');
  list.sort((a, b) => {
    let cmp;
    if (field === 'id') cmp = a.id - b.id;
    else if (field === 'title') cmp = a.title.localeCompare(b.title);
    else cmp = a.id - b.id;
    return dir === 'asc' ? cmp : -cmp;
  });

  return list;
}

function rerender() {
  const list = getFilteredAndSorted();
  renderCards(list);
  updateStats(SOLUTIONS.filter(s => s.status === 'solved' || currentFilter === 'all'));
}

// =====================================================
// Event Listeners
// =====================================================

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  rerender();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.filter === 'easy' || btn.dataset.filter === 'medium' || btn.dataset.filter === 'hard') {
      btn.classList.add(btn.dataset.filter);
    }
    currentFilter = btn.dataset.filter;
    rerender();
  });
});

// Sort
document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  rerender();
});

// =====================================================
// Open solution detail
// =====================================================

function openSolution(id) {
  window.location.href = `solution-detail.html?id=${id}`;
}

// =====================================================
// Init
// =====================================================

function init() {
  const el = document.getElementById('lastUpdated');
  if (el) {
    el.textContent = new Date().toLocaleDateString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric'
    });
  }
  rerender();
}

// Start loading solutions data
loadSolutions();
</script>
</body>
</html>
